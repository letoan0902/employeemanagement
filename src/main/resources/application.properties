spring.application.name=employeemanagement

# ===== CẤU HÌNH LOGGING THEO YÊU CẦU SRS =====
# Log level mặc định cho toàn bộ ứng dụng
logging.level.root=INFO

# Log level DEBUG cho controller - để hiển thị chi tiết request
logging.level.org.example.employeemanagement.controller=DEBUG

# Log level DEBUG cho service - để hiển thị chi tiết xử lý nghiệp vụ
logging.level.org.example.employeemanagement.service=DEBUG

# Định dạng log hiển thị trên console: [giờ] [level] [logger] - [message]
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{36} - %msg%n
